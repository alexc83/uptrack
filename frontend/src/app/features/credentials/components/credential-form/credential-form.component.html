<form class="credential-form" [formGroup]="form()" (ngSubmit)="submitted.emit()">
  <div class="field-grid">
    <label class="field field-full">
      <span>Credential name</span>
      <input type="text" formControlName="name" placeholder="RN License - Texas" />
      @if (getFieldError('name'); as errorMessage) {
        <small class="field-error">{{ errorMessage }}</small>
      }
    </label>

    <label class="field">
      <span>Type</span>
      <select formControlName="type">
        <option [ngValue]="null">Select type</option>
        @for (option of typeOptions; track option.value) {
          <option [ngValue]="option.value">{{ option.label }}</option>
        }
      </select>
      @if (getFieldError('type'); as errorMessage) {
        <small class="field-error">{{ errorMessage }}</small>
      }
    </label>

    <label class="field">
      <span>Expiration date</span>
      <input type="date" formControlName="expirationDate" />
      @if (getFieldError('expirationDate'); as errorMessage) {
        <small class="field-error">{{ errorMessage }}</small>
      }
    </label>

    <label class="field field-full">
      <span>Issuing organization</span>
      <input type="text" formControlName="issuingOrganization" placeholder="Texas Board of Nursing" />
      @if (getFieldError('issuingOrganization'); as errorMessage) {
        <small class="field-error">{{ errorMessage }}</small>
      }
    </label>

    <label class="field">
      <span>Renewal cycle (months)</span>
      <input type="number" min="1" formControlName="renewalCycleMonths" placeholder="24" />
      @if (getFieldError('renewalCycleMonths'); as errorMessage) {
        <small class="field-error">{{ errorMessage }}</small>
      }
    </label>

    <label class="field">
      <span>Required CE hours</span>
      <input type="number" min="0" step="0.5" formControlName="requiredCEHours" placeholder="20" />
      @if (getFieldError('requiredCEHours'); as errorMessage) {
        <small class="field-error">{{ errorMessage }}</small>
      }
    </label>
  </div>

  @if (submitError(); as errorMessage) {
    <div class="submit-error" role="alert">{{ errorMessage }}</div>
  }

  <div class="form-actions">
    <button
      pButton
      type="button"
      [label]="cancelLabel()"
      severity="secondary"
      [disabled]="isSubmitting()"
      (click)="cancelled.emit()"
    ></button>
    <button
      class="credential-primary-button"
      pButton
      type="submit"
      [label]="submitLabel()"
      [loading]="isSubmitting()"
      [disabled]="form().invalid || isSubmitting()"
    ></button>
  </div>
</form>
