<p-dialog
  [visible]="open()"
  [modal]="true"
  [dismissableMask]="true"
  [draggable]="false"
  [resizable]="false"
  [closable]="false"
  styleClass="credential-form-dialog"
  (visibleChange)="handleVisibleChange($event)"
>
  <ng-template pTemplate="header">
    <div class="dialog-header">
      <span class="eyebrow">Credential</span>
      <h2>Add credential</h2>
      <p>Create a live credential record without leaving your current page.</p>
    </div>
  </ng-template>

  <app-credential-form
    [form]="form"
    submitLabel="Save Credential"
    [isSubmitting]="isSubmitting()"
    [submitError]="submitError()"
    (submitted)="submit()"
    (cancelled)="handleClose()"
  />
</p-dialog>
