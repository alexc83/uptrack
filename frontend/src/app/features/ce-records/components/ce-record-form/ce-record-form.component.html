<form class="ce-record-form" [formGroup]="form()" (ngSubmit)="submitted.emit()">
  <div class="field-grid">
    @if (showCredentialField()) {
      <label class="field field-full">
        <span>Credential</span>
        <select formControlName="credentialId">
          <option value="">Select a credential</option>
          @for (option of credentialOptions(); track option.credentialId) {
            <option [value]="option.credentialId">
              {{ option.credentialName }} · {{ option.credentialOrganization }}
            </option>
          }
        </select>
        @if (getFieldError('credentialId'); as errorMessage) {
          <small class="field-error">{{ errorMessage }}</small>
        }
      </label>
    }

    <label class="field field-full">
      <span>Title</span>
      <input type="text" formControlName="title" placeholder="Trauma Update" />
      @if (getFieldError('title'); as errorMessage) {
        <small class="field-error">{{ errorMessage }}</small>
      }
    </label>

    <label class="field field-full">
      <span>Provider</span>
      <input type="text" formControlName="provider" placeholder="AACN" />
      @if (getFieldError('provider'); as errorMessage) {
        <small class="field-error">{{ errorMessage }}</small>
      }
    </label>

    <label class="field">
      <span>Hours</span>
      <input type="number" min="0.1" step="0.1" formControlName="hours" placeholder="4.5" />
      @if (getFieldError('hours'); as errorMessage) {
        <small class="field-error">{{ errorMessage }}</small>
      }
    </label>

    <label class="field">
      <span>Date completed</span>
      <input type="date" formControlName="dateCompleted" />
      @if (getFieldError('dateCompleted'); as errorMessage) {
        <small class="field-error">{{ errorMessage }}</small>
      }
    </label>

    <label class="field field-full">
      <span>Certificate URL</span>
      <input type="url" formControlName="certificateUrl" placeholder="https://example.com/certificate.pdf" />
    </label>
  </div>

  @if (submitError(); as errorMessage) {
    <div class="submit-error" role="alert">{{ errorMessage }}</div>
  }

  <div class="form-actions">
    <button
      pButton
      type="button"
      [label]="cancelLabel()"
      severity="secondary"
      [disabled]="isSubmitting()"
      (click)="cancelled.emit()"
    ></button>
    <button
      class="credential-primary-button"
      pButton
      type="submit"
      [label]="submitLabel()"
      [loading]="isSubmitting()"
      [disabled]="form().invalid || isSubmitting()"
    ></button>
  </div>
</form>
