<section class="drawer-content">
  <header class="drawer-header">
    <div class="identity-copy">
      <h2>{{ view().title }}</h2>
      <p>{{ view().subtitle }}</p>
    </div>

    <button
      pButton
      type="button"
      icon="pi pi-times"
      severity="secondary"
      text
      rounded
      aria-label="Close list drawer"
      (click)="close.emit()"
    ></button>
  </header>

  @if (view().items.length > 0) {
    <div class="list-scroll">
      @for (item of view().items; track item.id) {
        <button class="list-item" type="button" (click)="credentialSelected.emit(item.id)">
          <div class="item-topline">
            <div class="item-copy">
              <strong>{{ item.name }}</strong>
              <span>{{ item.organization }}</span>
            </div>
            <span class="status-chip" [class]="'status-chip status-chip-' + item.statusTone">
              {{ item.statusLabel }}
            </span>
          </div>

          <div class="item-meta">
            <span class="type-chip">{{ item.typeLabel }}</span>
            <span>{{ item.supportingText }}</span>
          </div>

          @if (item.progressPercent !== undefined) {
            <div class="progress-block">
              <div class="progress-header">
                <span>{{ item.progressLabel }}</span>
                <span>{{ item.helperLabel }}</span>
              </div>
              <div class="progress-track">
                <span
                  class="progress-fill"
                  [class]="'progress-fill progress-fill-' + item.progressTone"
                  [style.width.%]="item.progressPercent"
                ></span>
              </div>
            </div>
          } @else if (item.helperLabel) {
            <span class="helper-pill">{{ item.helperLabel }}</span>
          }
        </button>
      }
    </div>
  } @else {
    <div class="empty-state">
      <strong>No items to review</strong>
      <p>This list is empty right now.</p>
    </div>
  }
</section>
