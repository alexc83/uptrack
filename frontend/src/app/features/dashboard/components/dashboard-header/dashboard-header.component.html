<header class="dashboard-header">
  <div class="dashboard-heading">
    <h1>{{ header().greeting }}, {{ header().firstName }} <span class="wave">👋</span></h1>
    <p>{{ header().formattedDate }}</p>
  </div>

  <div class="dashboard-actions">
    <button class="action-button action-button-secondary" type="button">
      <i class="pi pi-plus"></i>
      <span>Add CE Record</span>
    </button>
    <button class="action-button action-button-primary" type="button">
      <i class="pi pi-plus"></i>
      <span>Add Credential</span>
    </button>
  </div>
</header>
