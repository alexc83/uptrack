<header class="dashboard-header">
  <div class="dashboard-heading">
    <span class="eyebrow">Dashboard</span>
    <h1>Live compliance overview</h1>
    <p class="dashboard-subtext">
      Monitor credential urgency, CE progress, and recent activity from one live dashboard.
    </p>
    <div class="dashboard-greeting">
      <strong>{{ header().greeting }}, {{ header().firstName }} <span class="wave">👋</span></strong>
      <span>{{ header().formattedDate }}</span>
    </div>
  </div>

  <div class="dashboard-actions">
    <button
      pButton
      class="dashboard-secondary-button"
      type="button"
      label="Add CE Record"
      icon="pi pi-plus"
      severity="secondary"
    ></button>
    <button
      pButton
      class="dashboard-primary-button"
      type="button"
      label="Add Credential"
      icon="pi pi-plus"
      (click)="addCredentialRequested.emit()"
    ></button>
  </div>
</header>
