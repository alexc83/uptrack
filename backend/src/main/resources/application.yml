server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: uptrack-backend
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

logging:
  level:
    org.hibernate.SQL: info

auth:
  jwt:
    secret: ${AUTH_JWT_SECRET}
    expiration-seconds: ${AUTH_JWT_EXPIRATION_SECONDS}

cloudinary:
  cloud-name: ${CLOUDINARY_CLOUD_NAME}
  api-key: ${CLOUDINARY_API_KEY}
  api-secret: ${CLOUDINARY_API_SECRET}

app:
  cors:
    allowed-origin-patterns: ${ALLOWED_ORIGIN_PATTERNS:http://localhost:4200,http://127.0.0.1:4200}
