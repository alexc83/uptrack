spring:
  datasource:
    url: jdbc:h2:mem:uptrack-test;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

auth:
  jwt:
    secret: test-secret-key-with-at-least-thirty-two-characters
    expiration-seconds: 3600

cloudinary:
  cloud-name: test-cloud
  api-key: test-key
  api-secret: test-secret
